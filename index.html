<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>프롬뱅크 포트폴리오</title>
    <meta
      name="description"
      content="카카오뱅크 AI 서비스 기획 어시스턴트 지원을 위한 프롬뱅크 PDF 포트폴리오 뷰어입니다."
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section class="intro-screen" aria-label="포트폴리오 시작 화면">
      <div class="intro-copy">
        <h1>프롬뱅크<span>(prombank)</span></h1>
        <p>카카오뱅크 AI 서비스 기획 어시스턴트 / 포트폴리오</p>
      </div>
      <button class="intro-button" type="button" aria-label="프롬뱅크 포트폴리오 보기">
        <span>portfolio open</span>
        <i></i>
      </button>
    </section>

    <main class="viewer" id="viewer" aria-label="프롬뱅크 PDF 포트폴리오 뷰어">
      <section class="book-stage">
        <div class="viewer-head">
          <p>prombank portfolio</p>
          <strong><span id="currentPage">1</span> / <span id="totalPages">23</span></strong>
        </div>

        <div class="book" aria-live="polite">
          <button class="page-button prev" type="button" aria-label="이전 슬라이드">
            <span></span>
          </button>

          <figure class="page-frame">
            <div class="page-sheet">
              <img id="slideImage" src="./assets/slides/page_01.jpg" alt="프롬뱅크 PDF 1페이지" />
            </div>
          </figure>

          <button class="page-button next" type="button" aria-label="다음 슬라이드">
            <span></span>
          </button>
        </div>

        <div class="viewer-controls">
          <button class="text-button" id="prevButton" type="button">이전</button>
          <div class="progress" aria-hidden="true">
            <i id="progressBar"></i>
          </div>
          <button class="text-button" id="nextButton" type="button">다음</button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
